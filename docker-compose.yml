version: '3.8'

services:
  gateway:
    build:
      context: ./backend-go
      dockerfile: Dockerfile
    container_name: go-api-gateway
    ports:
      - "8080:8080"
    environment:
      - APP_ENV=production
      - DB_URL=postgres://postgres:postgres@postgres:5432/enterprise_ai?sslmode=disable
      - REDIS_URL=redis://redis:6379/1
      - APP_PORT=8080
      - JWT_SECRET=supersecretjwtkey_production_ready_9912!
      - JWT_REFRESH_SECRET=supersecretjwtrefreshkey_production_ready_9912!
      - AI_SERVICE_URL=http://ai-service:8000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai-service:
        condition: service_started
    networks:
      - ai-network

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: python-ai-service
    ports:
      - "8000:8000"
    environment:
      - ENV=production
    networks:
      - ai-network

  postgres:
    image: postgres:15-alpine
    container_name: postgres-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: enterprise_ai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ai-network

  redis:
    image: redis:7-alpine
    container_name: redis-cache
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ai-network

volumes:
  postgres_data:
  redis_data:

networks:
  ai-network:
    driver: bridge
